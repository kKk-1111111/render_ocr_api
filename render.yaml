services:
  - type: web
    name: render-ocr-api
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: STORAGE_DIR
        value: /app/storage
      - key: MAX_DOWNLOAD_MB
        value: "100"
      - key: MAX_PAGES_PER_JOB
        value: "300"
      - key: DEFAULT_DPI
        value: "150"
      - key: DEFAULT_LANGS
        value: eng+chi_tra
